name: Backend Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo_pgsql, intl, zip
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        run: bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: "postgresql://app:!ChangeMe!@localhost:5432/app_test?serverVersion=16"

      - name: Run tests
        run: bin/phpunit
        env:
          DATABASE_URL: "postgresql://app:!ChangeMe!@localhost:5432/app_test?serverVersion=16"

      - name: Static analysis
        run: vendor/bin/phpstan analyse src --level=1
